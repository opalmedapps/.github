name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  merge_group:

concurrency:
  group: "${{ github.ref }}-ci"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    uses: opalmedapps/actions/.github/workflows/prek.yaml@main
    with:
      # run in test when testing the markdownlint workflow
      skip: markdownlint-cli2
